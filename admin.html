<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Soul Neter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="siteConfig.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b1a14;--side:#0f2218;--card:#122a1c;--line:rgba(196,165,90,.15);
  --gold:#c4a55a;--gold2:#a8883e;--txt:#f0ece0;--txt2:rgba(240,236,224,.55);
  --green:#1e3528;--green2:#2d5a3d;--red:#c06060;--blue:#5a8ac4;
}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
.hidden{display:none!important}
a{color:var(--gold);text-decoration:none}

/* ── LOGIN ── */
#adLogin{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse at 30% 20%,rgba(196,165,90,.08),transparent 55%),var(--bg)}
.lc{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:36px 30px;
  max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lc-logo{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--green),var(--green2));
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:1.5rem}
.lc h1{font-family:"Fraunces",serif;font-size:1.4rem;font-weight:900;text-align:center;margin-bottom:4px}
.lc-sub{font-size:12px;color:var(--txt2);text-align:center;margin-bottom:26px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt2);margin-bottom:6px}
.inp{width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--line);border-radius:10px;
  padding:11px 14px;color:var(--txt);font-size:14px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:rgba(240,236,224,.25)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;
  padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-gold{background:var(--gold);color:#1a2a14;width:100%}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--txt2)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:rgba(192,96,96,.15);border:1px solid rgba(192,96,96,.3);color:var(--red)}
.btn-danger:hover{background:rgba(192,96,96,.25)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.err-box{background:rgba(192,96,96,.1);border:1px solid rgba(192,96,96,.3);color:#e89090;
  font-size:12px;padding:10px 13px;border-radius:8px;margin-bottom:14px;display:none}

/* ── LAYOUT ── */
#adApp{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;background:var(--side);border-right:1px solid var(--line);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:20px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.sb-logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--green),var(--green2));
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.sb-logo-name{font-family:"Fraunces",serif;font-size:14px;font-weight:700}
.sb-logo-sub{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.sb-section{padding:10px 0 4px 14px;font-size:9px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(196,165,90,.4);margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;
  color:var(--txt2);cursor:pointer;transition:all .18s;border-left:2.5px solid transparent;user-select:none}
.nav-item:hover{background:rgba(196,165,90,.06);color:var(--txt)}
.nav-item.on{background:rgba(196,165,90,.09);color:var(--gold);border-left-color:var(--gold);font-weight:600}
.nav-item i{font-size:16px;width:18px;text-align:center;flex-shrink:0}
.sb-footer{margin-top:auto;padding:16px 18px;border-top:1px solid var(--line)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--side);border-bottom:1px solid var(--line);padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-family:"Fraunces",serif;font-size:1.1rem;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── CARDS ── */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
.stat-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:12px}
.stat-ico.g{background:rgba(196,165,90,.12);color:var(--gold)}
.stat-ico.gr{background:rgba(45,90,61,.3);color:#6ab87a}
.stat-ico.b{background:rgba(90,138,196,.15);color:var(--blue)}
.stat-ico.r{background:rgba(192,96,96,.12);color:var(--red)}
.stat-val{font-family:"Fraunces",serif;font-size:1.8rem;font-weight:900;color:var(--txt);line-height:1}
.stat-lbl{font-size:11px;color:var(--txt2);margin-top:4px}
.stat-delta{font-size:11px;font-weight:600;margin-top:8px}
.stat-delta.up{color:#6ab87a}
.stat-delta.down{color:var(--red)}

/* ── TABLE ── */
.tbl-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.tbl-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-family:"Fraunces",serif;font-size:1rem;font-weight:700}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--txt2);
  padding:10px 16px;text-align:left;border-bottom:1px solid var(--line)}
td{font-size:13px;color:var(--txt);padding:12px 16px;border-bottom:1px solid rgba(196,165,90,.07)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(196,165,90,.03)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;
  padding:3px 9px;border-radius:20px}
.badge-green{background:rgba(106,184,122,.15);color:#6ab87a;border:1px solid rgba(106,184,122,.3)}
.badge-gold{background:rgba(196,165,90,.15);color:var(--gold);border:1px solid rgba(196,165,90,.3)}
.badge-red{background:rgba(192,96,96,.15);color:var(--red);border:1px solid rgba(192,96,96,.3)}
.badge-blue{background:rgba(90,138,196,.15);color:var(--blue);border:1px solid rgba(90,138,196,.3)}
.badge-gray{background:rgba(255,255,255,.06);color:var(--txt2);border:1px solid var(--line)}

/* ── PANEL / FORM ── */
.panel{max-width:800px}
.section{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:16px}
.section-title{font-family:"Fraunces",serif;font-size:1rem;font-weight:700;margin-bottom:3px}
.section-sub{font-size:12px;color:var(--txt2);margin-bottom:18px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.form-row.full{grid-template-columns:1fr}
.form-field label{display:block;font-size:11px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--txt2);margin-bottom:6px}
textarea.inp{resize:vertical;min-height:80px;line-height:1.55}
.help{font-size:10px;color:var(--txt2);margin-top:4px;opacity:.7}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--txt2);
  background:none;border:none;margin-bottom:18px;padding:0;cursor:pointer}
.back-btn:hover{color:var(--gold)}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;
  border-radius:20px;background:rgba(196,165,90,.1);border:1px solid rgba(196,165,90,.25);color:var(--gold)}
.chip button{background:none;border:none;color:var(--gold);font-size:13px;line-height:1;padding:0;cursor:pointer}

/* ── CONVERSATION VIEWER ── */
.conv-msg{padding:10px 14px;border-radius:11px;margin-bottom:8px;font-size:13px;line-height:1.65;max-width:85%}
.conv-msg.user{background:rgba(196,165,90,.1);border:1px solid rgba(196,165,90,.2);align-self:flex-end;margin-left:auto}
.conv-msg.anna{background:rgba(30,53,40,.4);border:1px solid rgba(45,90,61,.3)}
.conv-wrap{display:flex;flex-direction:column;gap:2px;max-height:500px;overflow-y:auto;padding:16px}
.conv-role{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--txt2);margin-bottom:4px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--green2);color:#f0ece0;padding:12px 22px;border-radius:30px;
  font-size:13px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.4);
  z-index:999;display:none;align-items:center;gap:8px;white-space:nowrap}
.toast.err{background:var(--red)}

/* ── SEARCH ── */
.search-row{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.search-inp{flex:1;background:rgba(255,255,255,.04);border:1.5px solid var(--line);
  border-radius:10px;padding:9px 14px;color:var(--txt);font-size:13px;outline:none}
.search-inp:focus{border-color:var(--gold)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;
  display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--line);border-radius:18px;
  width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-hd{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-family:"Fraunces",serif;font-size:1rem;font-weight:700}
.modal-x{background:none;border:none;color:var(--txt2);font-size:18px;cursor:pointer;padding:4px}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-ft{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* ── RESPONSIVE ── */
.mob-bar{display:none}
@media(max-width:900px){
  .sidebar{display:none}
  .grid-4{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}
  .mob-bar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--side);
    border-top:1px solid var(--line);z-index:100;padding:4px 0 8px}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:7px 4px;color:var(--txt2);cursor:pointer;font-size:9px;font-weight:600;
    letter-spacing:.04em;text-transform:uppercase;transition:color .18s;border:none;background:none}
  .mob-tab i{font-size:20px}
  .mob-tab.on{color:var(--gold)}
  .content{padding-bottom:80px}
  .mob-menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150}
  .mob-menu-overlay.open{display:block}
  .mob-drawer{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--side);
    border-right:1px solid var(--line);z-index:151;transform:translateX(-100%);
    transition:transform .25s ease;display:flex;flex-direction:column;overflow-y:auto}
  .mob-drawer.open{transform:translateX(0)}
}
@media(max-width:600px){.grid-4{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="adLogin">
  <div class="lc">
    <div class="lc-logo">🌿</div>
    <h1>Soul · Neter Admin</h1>
    <div class="lc-sub">Painel de administração da plataforma</div>
    <div class="err-box" id="adErr">E-mail ou senha incorretos.</div>
    <div class="field">
      <label>E-mail</label>
      <input class="inp" id="adEmail" type="email" placeholder="admin@neter.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="field">
      <label>Senha</label>
      <input class="inp" id="adPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-gold" onclick="doLogin()"><i class="ti ti-login"></i> Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="adApp" class="hidden">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-mark">🌿</div>
      <div>
        <div class="sb-logo-name">Soul Admin</div>
        <div class="sb-logo-sub">por Neter</div>
      </div>
    </div>
    <div id="adNav"></div>
    <div class="sb-footer">
      <button class="btn btn-outline btn-sm" onclick="doLogout()" style="width:100%"><i class="ti ti-logout"></i> Sair</button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="adPageTitle">Dashboard</div>
      <div class="topbar-right">
        <span id="adConnStatus" style="font-size:11px;color:var(--txt2)"></span>
      </div>
    </div>
    <div class="content" id="adContent"></div>
  </div>
  <!-- MOBILE BOTTOM BAR -->
  <div class="mob-bar" id="mobBar">
    <button class="mob-tab" onclick="route('dashboard')" id="mobt-dashboard"><i class="ti ti-layout-dashboard"></i>Dashboard</button>
    <button class="mob-tab" onclick="route('users')" id="mobt-users"><i class="ti ti-users"></i>Usuários</button>
    <button class="mob-tab" onclick="route('anna')" id="mobt-anna"><i class="ti ti-message-circle-2"></i>Anna</button>
    <button class="mob-tab" onclick="route('analysis')" id="mobt-analysis"><i class="ti ti-topology-star-3"></i>Análises</button>
    <button class="mob-tab" onclick="openMobMenu()" id="mobt-more"><i class="ti ti-dots"></i>Mais</button>
  </div>
  <!-- MOBILE DRAWER -->
  <div class="mob-menu-overlay" id="mobOverlay" onclick="closeMobMenu()"></div>
  <div class="mob-drawer" id="mobDrawer">
    <div class="sb-logo" style="padding:20px 18px 16px">
      <div class="sb-logo-mark">🌿</div>
      <div><div class="sb-logo-name">Soul Admin</div><div class="sb-logo-sub">por Neter</div></div>
      <button onclick="closeMobMenu()" style="margin-left:auto;background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer">✕</button>
    </div>
    <div id="mobDrawerNav"></div>
    <div style="padding:16px 18px;margin-top:auto;border-top:1px solid var(--line)">
      <button class="btn btn-outline btn-sm" onclick="doLogout()" style="width:100%"><i class="ti ti-logout"></i> Sair</button>
    </div>
  </div>
</div>

<!-- MODAL GENÉRICO -->
<div class="overlay" id="adModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="adModalTitle">—</div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="adModalBody"></div>
    <div class="modal-ft" id="adModalFt"></div>
  </div>
</div>

<div class="toast" id="adToast"></div>

<script src="admin.js"></script>
</body>
</html>
